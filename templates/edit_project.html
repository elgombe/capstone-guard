{% extends "base.html" %}
{% block title %}Edit Project - CapstoneGuard{% endblock %}

{% block content %}
<div style="max-width:780px;margin:0 auto;padding:2rem 1.5rem;">

    <div class="page-header">
        <h1 class="page-title">Edit Project</h1>
        <p class="page-subtitle">Update your project details below.</p>
    </div>

    <div class="oc-card">
        <div class="oc-card-body" style="padding:2rem;">
            <form method="POST" action="{{ url_for('projects.edit_project', project_id=project.id) }}">

                <div class="field">
                    <label class="oc-label" for="title">Project Title <span style="color:#e53e3e;">*</span></label>
                    <input type="text" class="oc-input oc-input-lg" id="title" name="title" value="{{ project.title }}" required>
                </div>

                <div class="field" style="margin-top:1rem;">
                    <label class="oc-label" for="description">Project Description <span style="color:#e53e3e;">*</span></label>
                    <textarea class="oc-textarea" id="description" name="description" rows="7" required>{{ project.description }}</textarea>
                </div>

                <div class="field" style="margin-top:1rem;">
                    <label class="oc-label">Stream <span style="color:#e53e3e;">*</span></label>
                    <div style="display:grid;grid-template-columns:1fr 140px;gap:0.75rem;">
                        <div>
                            <label class="oc-label" for="program" style="font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;">Programme</label>
                            <select class="oc-select" id="program" name="program" required onchange="resolveStream()">
                                <option value="">Select programme</option>
                                {% for prog in programs %}
                                <option value="{{ prog }}" {% if current_program == prog %}selected{% endif %}>{{ prog }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="oc-label" for="intake_year" style="font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;">Year</label>
                            <input type="number" class="oc-input" id="intake_year" name="intake_year"
                                   placeholder="e.g. 2024"
                                   min="2023" max="2030" required
                                   value="{{ current_year }}"
                                   oninput="resolveStream()">
                        </div>
                    </div>
                    <input type="hidden" id="stream_id" name="stream_id" value="{{ project.stream_id }}">
                    <p id="streamStatus" class="oc-help" style="margin-top:6px;">
                        <span style="color:var(--green-primary);"><i class="bi bi-check-circle"></i> Current stream: {{ project.stream.name }}</span>
                    </p>
                </div>

                <div class="field" style="margin-top:1rem;">
                    <label class="oc-label" for="technologies">Technologies Used</label>
                    <input type="text" class="oc-input" id="technologies" name="technologies" value="{{ project.technologies or '' }}">
                </div>

                <div class="field" style="margin-top:1rem;">
                    <label class="oc-label" for="github_url">GitHub Repository URL <span style="color:var(--text-muted);font-size:0.85rem;">(optional)</span></label>
                    <input type="url" class="oc-input" id="github_url" name="github_url" value="{{ project.github_url or '' }}">
                </div>

                <div class="field" style="margin-top:1rem;">
                    <label class="oc-label" for="demo_url">Demo / Live URL</label>
                    <input type="url" class="oc-input" id="demo_url" name="demo_url" value="{{ project.demo_url or '' }}">
                </div>

                <div style="display:flex;gap:0.75rem;margin-top:1.8rem;padding-top:1.2rem;border-top:1px solid var(--border);">
                    <a href="{{ url_for('projects.project_detail', project_id=project.id) }}" class="btn-oc btn-oc-outline">Cancel</a>
                    <button type="submit" class="btn-oc btn-oc-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
<style>
@media(max-width:600px){
    div[style*="grid-template-columns:1fr 140px"]{grid-template-columns:1fr !important;}
}
</style>

<script>
const streamMap = {{ stream_map | tojson }};

function resolveStream() {
    const prog  = document.getElementById('program').value.trim();
    const year  = document.getElementById('intake_year').value.trim();
    const hidden = document.getElementById('stream_id');
    const status = document.getElementById('streamStatus');

    if (!prog || !year) { hidden.value = ''; status.textContent = ''; return; }

    const key = year + ' ' + prog;
    if (streamMap[key] !== undefined) {
        hidden.value    = streamMap[key];
        status.innerHTML = '<span style="color:var(--green-primary);"><i class="bi bi-check-circle"></i> Stream: ' + key + '</span>';
    } else {
        hidden.value    = '';
        status.innerHTML = '<span style="color:#e53e3e;"><i class="bi bi-exclamation-circle"></i> No stream found for ' + key + '</span>';
    }
}
</script>
{% endblock %}
