{% extends "base.html" %}
{% block title %}Settings - CapstoneGuard{% endblock %}

{% block content %}
<div style="max-width:1100px;margin:0 auto;padding:2rem 1.5rem;">

    <!-- Header -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.8rem;flex-wrap:wrap;gap:1rem;">
        <div>
            <h1 class="page-title">Settings</h1>
            <p class="page-subtitle">Manage accounts and system configuration.</p>
        </div>
        <a href="{{ url_for('dashboard.dash') }}" class="btn-oc btn-oc-outline">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div style="display:grid;grid-template-columns:220px 1fr;gap:1.4rem;align-items:start;">

        <!-- Sidebar Nav -->
        <div class="oc-card" style="overflow:visible;position:sticky;top:74px;">
            <div style="padding:0.5rem;" id="settings-nav">

                <a href="{{ url_for('admin_bp.partial_reviewers') }}"
                   hx-get="{{ url_for('admin_bp.partial_reviewers') }}"
                   hx-target="#settings-panel"
                   hx-swap="innerHTML"
                   hx-push-url="{{ url_for('admin_bp.settings') }}?tab=reviewers"
                   onclick="setActiveTab(this)"
                   class="settings-nav-item is-active">
                    <i class="bi bi-person-badge"></i> Reviewer Accounts
                </a>

                <a href="{{ url_for('admin_bp.partial_users') }}"
                   hx-get="{{ url_for('admin_bp.partial_users') }}"
                   hx-target="#settings-panel"
                   hx-swap="innerHTML"
                   hx-push-url="{{ url_for('admin_bp.settings') }}?tab=users"
                   onclick="setActiveTab(this)"
                   class="settings-nav-item">
                    <i class="bi bi-people"></i> Manage Users
                </a>

                <a href="{{ url_for('admin_bp.partial_change_password') }}"
                   hx-get="{{ url_for('admin_bp.partial_change_password') }}"
                   hx-target="#settings-panel"
                   hx-swap="innerHTML"
                   hx-push-url="{{ url_for('admin_bp.settings') }}?tab=password"
                   onclick="setActiveTab(this)"
                   class="settings-nav-item">
                    <i class="bi bi-lock"></i> Change Password
                </a>

            </div>
        </div>

        <!-- Dynamic Panel — loaded by HTMX -->
        <div id="settings-panel"
             hx-get="{{ url_for('admin_bp.partial_' + (active_tab or 'reviewers')) }}"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div style="display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text-muted);">
                <i class="bi bi-arrow-repeat" style="animation:spin .7s linear infinite;margin-right:8px;font-size:1.1rem;"></i> Loading…
            </div>
        </div>

    </div>
</div>

<style>
.settings-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--text-muted);
    margin-top: 2px;
    transition: background .15s, color .15s;
    cursor: pointer;
}
.settings-nav-item:first-child { margin-top: 0; }
.settings-nav-item.is-active {
    background: var(--green-light);
    color: var(--green-primary);
    font-weight: 600;
}
.settings-nav-item:hover:not(.is-active) {
    background: var(--bg);
    color: var(--text-dark);
}
@keyframes spin { to { transform: rotate(360deg); } }
@media(max-width:768px){
    div[style*="grid-template-columns:220px 1fr"] { grid-template-columns:1fr !important; }
}
</style>

<script>
function setActiveTab(el) {
    document.querySelectorAll('.settings-nav-item').forEach(a => a.classList.remove('is-active'));
    el.classList.add('is-active');
}

// Restore correct active tab if user lands directly via ?tab=
(function() {
    const tab = new URLSearchParams(location.search).get('tab') || 'reviewers';
    const map = { reviewers: 0, users: 1, password: 2 };
    const items = document.querySelectorAll('.settings-nav-item');
    items.forEach(a => a.classList.remove('is-active'));
    if (items[map[tab]] !== undefined) items[map[tab]].classList.add('is-active');
})();
</script>
{% endblock %}
